name: Keep Render Server Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  ping-servers:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Main Backend
        run: curl -sSf https://pulsecrm-ikbb.onrender.com/health || echo "Backend ping failed"
      
      - name: Ping Channel Service
        run: curl -sSf https://pulsecrm-1.onrender.com/health || echo "Channel service ping failed"
