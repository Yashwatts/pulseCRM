name: Keep Render Server Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  ping-servers:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Main Backend
        # REPLACE THIS URL with your actual Render Main Backend URL
        run: curl -sSf https://YOUR_MAIN_BACKEND_URL.onrender.com/health || echo "Backend ping failed"
      
      - name: Ping Channel Service
        # REPLACE THIS URL with your actual Render Channel Service URL
        run: curl -sSf https://YOUR_CHANNEL_SERVICE_URL.onrender.com/health || echo "Channel service ping failed"
